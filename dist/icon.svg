<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Euro symbol -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="white" text-anchor="middle">€</text>
  
  <!-- Chart bars -->
  <rect x="80" y="380" width="50" height="80" rx="8" fill="rgba(255,255,255,0.3)"/>
  <rect x="150" y="340" width="50" height="120" rx="8" fill="rgba(255,255,255,0.4)"/>
  <rect x="312" y="360" width="50" height="100" rx="8" fill="rgba(255,255,255,0.4)"/>
  <rect x="382" y="320" width="50" height="140" rx="8" fill="rgba(255,255,255,0.3)"/>
</svg>
